# Minimal tmux defaults for AGS sandbox team-pane workflows.
# Intentionally keeps the default prefix (Ctrl-b).

# Ergonomics
set -g mouse on
set -g history-limit 100000
set -g renumber-windows on
set -g set-clipboard on
set -g status-keys vi
setw -g mode-keys vi

# Keep new panes/windows in the current working directory.
bind c new-window -c '#{pane_current_path}'
bind '"' split-window -v -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Quality-of-life helpers
bind r source-file ~/.tmux.conf \; display-message 'tmux config reloaded'

# Simple status line tweaks without plugins.
set -g status-position top
set -g status-left-length 40
set -g status-right-length 80
set -g status-left '#S '
set -g status-right '#{?client_prefix,#[fg=colour231,bg=colour160] PREFIX #[default],} %Y-%m-%d %H:%M '
set -g status-style 'bg=colour235,fg=colour250'
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour39'
